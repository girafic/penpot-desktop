<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Penpot Desktop</title>
<style>body{background:#0e0e11;color:#7a7a8e;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0}
.logo{width:96px;height:96px;margin-bottom:24px;border-radius:20px}
</style></head>
<body><img class="logo" src="app-icon.png" alt="Penpot Desktop"><p id="msg">Starting Penpot Desktop…</p>
<script>
fetch('/__penpot_desktop/translations').then(r=>r.json()).then(t=>{
  document.getElementById('msg').textContent=(t['settings.title']||'Penpot Desktop')+'…';
}).catch(function(){});
</script>
</body></html>
