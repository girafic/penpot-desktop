name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      penpot-version: ${{ steps.version.outputs.tag }}
    steps:
      - name: Get latest Penpot release tag
        id: version
        run: |
          TAG=$(curl -sI https://github.com/penpot/penpot/releases/latest | grep -i ^location | sed 's/.*tag\///' | tr -d '\r\n')
          echo "tag=$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: ubuntu-22.04
            label: Linux
          - os: windows-latest
            label: Windows

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── System dependencies ────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Windows build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install rsync -y

      # ── Toolchains ────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Clojure (macOS/Linux)
        if: runner.os != 'Windows'
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Setup Clojure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # DeLaGuardo/setup-clojure installs a PowerShell module on Windows,
          # which doesn't work in Git Bash. Use deps.clj instead — a native
          # drop-in replacement for the Clojure CLI that works in any shell.
          BIN_DIR="$HOME/bin"
          mkdir -p "$BIN_DIR"
          LATEST=$(curl -sI https://github.com/borkdude/deps.clj/releases/latest | grep -i ^location | sed 's/.*tag\///' | tr -d '\r\n')
          VERSION="${LATEST#v}"
          curl -sL "https://github.com/borkdude/deps.clj/releases/download/${LATEST}/deps.clj-${VERSION}-windows-amd64.zip" -o /tmp/deps-clj.zip
          unzip -o /tmp/deps-clj.zip -d "$BIN_DIR"
          # deps.exe is a drop-in for clojure — create copies so both names work
          cp "$BIN_DIR/deps.exe" "$BIN_DIR/clojure.exe"
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          "$BIN_DIR/deps.exe" --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # ── Caches ────────────────────────────────────────────────
      - name: Cache Maven / Clojure deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/deps.edn') }}
          restore-keys: ${{ runner.os }}-maven-

      # ── Build ─────────────────────────────────────────────────
      - name: Install Node dependencies
        run: bun install

      - name: Build Penpot frontend
        run: bun run build-frontend
        env:
          PENPOT_BRANCH: ${{ needs.resolve-version.outputs.penpot-version }}

      - name: Build Tauri app
        run: bun run tauri:build

      # ── Upload artifacts (always, for PR/branch builds) ───────
      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: penpot-desktop-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: penpot-desktop-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: penpot-desktop-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ── GitHub Release (only on v* tags) ──────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            artifacts/**/*.exe
